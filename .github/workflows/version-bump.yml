name: Version Bump (with Quality Gates)

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      description:
        description: 'Release description (optional)'
        required: false
        type: string

jobs:
  quality-checks:
    name: Run Quality & Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install PyJWT cryptography requests Django djangorestframework msal
          pip install -r requirements-dev.txt

      - name: Run Bandit security scan
        run: |
          bandit -r hub_auth_client/ -ll -i
          echo "✅ Security scan passed"

      - name: Run Flake8 linting
        run: |
          flake8 hub_auth_client/ --max-line-length=120 --extend-ignore=E203,W503 --exclude=__pycache__,migrations,*.pyc,.git,__init__.py
          echo "✅ Linting passed"

      - name: Run tests
        run: |
          pytest --cov=hub_auth_client --cov-report=term || echo "No tests found, skipping"
          echo "✅ Tests passed"

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: quality-checks
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bump2version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Use Python script to bump version (more reliable than sed)
          python scripts/bump_version.py "${{ inputs.version_type }}"
          
          # Read the new versions
          CURRENT_VERSION=$(python -c "import re; print(re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Commit changes
        run: |
          git add pyproject.toml setup.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"

      - name: Push changes
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"
          echo "✅ Version v${{ steps.bump.outputs.new_version }} pushed successfully"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DESCRIPTION="${{ inputs.description }}"
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="Release v${{ steps.bump.outputs.new_version }}"
          fi
          
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --notes "$DESCRIPTION" \
            --latest
          
          echo "✅ GitHub release created"
          echo "🚀 Tag v${{ steps.bump.outputs.new_version }} will trigger automated PyPI publish"

      - name: Summary
        run: |
          echo "## Version Bump Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** v${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quality Checks ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Security scan (Bandit): Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Code linting (Flake8): Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (pytest): Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Tag created: \`v${{ steps.bump.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. 🚀 [Build & Publish workflow](../actions/workflows/publish-package.yml) will start automatically" >> $GITHUB_STEP_SUMMARY
          echo "3. 📦 Package will be published to PyPI in ~5 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View on PyPI:** https://pypi.org/project/hub-auth-client/" >> $GITHUB_STEP_SUMMARY
