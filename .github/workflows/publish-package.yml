name: Build and Publish hub-auth-client

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # Trigger on version tags (e.g., v1.0.45)
    paths:
      - 'hub_auth_client/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'README_PACKAGE.md'
  pull_request:
    branches:
      - main
    paths:
      - 'hub_auth_client/**'
      - 'setup.py'
      - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-test.txt || pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest --cov=hub_auth_client --cov-report=xml --cov-report=term --cov-report=html || echo "No tests found, skipping"
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Check coverage threshold
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(tree.getroot().attrib.get('line-rate', '0'))")
            echo "Coverage: $(python -c "print(f'{float(\"$COVERAGE\") * 100:.2f}%')")"
            if (( $(echo "$COVERAGE < 0.40" | bc -l) )); then
              echo "❌ Coverage below 40% threshold"
              exit 1
            fi
          else
            echo "No coverage report generated"
          fi
        continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify README_PACKAGE.md exists
        run: |
          if [ ! -f "README_PACKAGE.md" ]; then
            echo "ERROR: README_PACKAGE.md not found!"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (on push to main)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI (Dry Run)
        run: |
          python -m pip install --upgrade pip twine
          echo "Would publish to TestPyPI:"
          ls -lh dist/
          echo "Skipping actual upload - use tags or releases to publish"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    environment:
      name: pypi
      url: https://pypi.org/p/hub-auth-client

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI (with token)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload dist/* --verbose

      # Alternative: Use trusted publishing (more secure, no token needed)
      # Uncomment below and remove token-based upload above
      # - name: Publish to PyPI (trusted publishing)
      #   uses: pypa/gh-action-pypi-publish@release/v1
