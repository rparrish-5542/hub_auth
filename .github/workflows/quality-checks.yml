name: Code Quality & Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  linting:
    name: Linting & Formatting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install PyJWT cryptography requests Django djangorestframework msal
          pip install flake8 black isort pylint mypy bandit

      - name: Run Black (code formatting check)
        run: |
          black --check --diff hub_auth_client/
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff hub_auth_client/
        continue-on-error: true

      - name: Run Flake8 (style guide)
        run: |
          flake8 hub_auth_client/ --max-line-length=120 --extend-ignore=E203,W503 \
            --exclude=__pycache__,migrations,*.pyc,.git,__init__.py
        continue-on-error: true

      - name: Run Pylint (code analysis)
        run: |
          pylint hub_auth_client/ --max-line-length=120 \
            --disable=C0111,C0103,R0903,W0212,C0330,C0326 \
            --exit-zero
        continue-on-error: true

      - name: Run MyPy (type checking)
        run: |
          mypy hub_auth_client/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install PyJWT cryptography requests Django djangorestframework msal
          pip install bandit safety pip-audit

      - name: Run Bandit (security issues)
        run: |
          bandit -r hub_auth_client/ -f json -o bandit-report.json || true
          bandit -r hub_auth_client/ -ll -i  # Show only medium/high severity

      - name: Run Safety (dependency vulnerabilities)
        run: |
          safety check --json --output safety-report.json || true
          safety check --short-report
        continue-on-error: true

      - name: Run pip-audit (dependency audit)
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@4081bf99e2866ebe428fc0477b69eb4fcda7220a  # v4.4.0
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  code-quality:
    name: Code Quality Metrics
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install radon vulture

      - name: Check code complexity
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc hub_auth_client/ -a -nb
          echo ""
          echo "=== Maintainability Index ==="
          radon mi hub_auth_client/ -nb

      - name: Find dead code
        run: |
          vulture hub_auth_client/ --min-confidence 80
        continue-on-error: true

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@473e622bdd0c05db4eae4e34e00e59b2097ff1bb  # v3.82.13
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [linting, security, code-quality]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "## Code Quality & Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ needs.linting.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
