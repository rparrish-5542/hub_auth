name: Django Docker CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_NAME: wedgwoodchristianservices/hubauth

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.14'

      # Step 3: Cache pip packages
      - name: Cache pip
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a  # v4.1.2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 6: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      # Step 7: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 8: Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_TAG="${GITHUB_RUN_NUMBER}"
          docker build -t $DOCKER_IMAGE_NAME:$IMAGE_TAG .
          docker tag $DOCKER_IMAGE_NAME:$IMAGE_TAG $DOCKER_IMAGE_NAME:latest

      # Step 9: Push Docker image
      - name: Push Docker image
        run: |
          IMAGE_TAG="${GITHUB_RUN_NUMBER}"
          docker push $DOCKER_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKER_IMAGE_NAME:latest

  # ──────────────────────────────────────────────
  # Security Scan with Trivy
  # ──────────────────────────────────────────────
  security-scan:
    name: Security Scan with Trivy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@2b6a709cf9c4025c5438138008beaddbb02086f0  # v0.20.0
        with:
          image-ref: 'wedgwoodchristianservices/hubauth:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          timeout: '10m'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner (JSON report)
        uses: aquasecurity/trivy-action@2b6a709cf9c4025c5438138008beaddbb02086f0  # v0.20.0
        with:
          image-ref: 'wedgwoodchristianservices/hubauth:latest'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          timeout: '10m'

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30
